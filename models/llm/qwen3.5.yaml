model: qwen/qwen-3.5
label:
  zh_Hans: Qwen3.5-397B-A17B
  en_US: Qwen3.5-397B-A17B
model_type: llm
features:
  - stream-tool-call
  - tool-call
  - vision
  - agent-thought
model_properties:
  mode: chat
  context_size: 268288
parameter_rules:
  - name: temperature
    use_template: temperature
  - name: top_p
    use_template: top_p
  - name: presence_penalty
    use_template: presence_penalty
  - name: frequency_penalty
    use_template: frequency_penalty
  - name: max_tokens
    use_template: max_tokens
    default: 4096
    min: 1
    max: 8192
pricing:
  input: "60.00"
  output: "360.00"
  unit: "0.000001"
  currency: USD
